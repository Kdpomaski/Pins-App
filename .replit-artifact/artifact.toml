kind = "web"
previewPath = "/"
title = "Pins"
version = "1.0.0"
id = "artifacts/pins"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18963

[services.development]
run = "pnpm --filter @workspace/pins run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pins", "run", "build" ]
serve = "static"
publicDir = "artifacts/pins/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18963"
BASE_PATH = "/"
